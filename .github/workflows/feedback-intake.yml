name: Feedback Intake

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: feedback-intake
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    outputs:
      has_feedback: ${{ steps.scan.outputs.has_feedback }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - id: scan
        name: Claim one pending Feedback
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
        run: |
          node scripts/controllers/intake-collect.mjs .ai/runs/intake
          if [[ -f .ai/runs/intake/empty ]]; then
            echo "has_feedback=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_feedback=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Upload redacted Intake evidence
        if: steps.scan.outputs.has_feedback == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: intake-evidence
          path: .ai/runs/intake/evidence.json
          retention-days: 1
      - name: Upload controller state
        if: steps.scan.outputs.has_feedback == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: intake-state
          path: .ai/runs/intake/state.json
          retention-days: 1

  qualify:
    needs: collect
    if: needs.collect.outputs.has_feedback == 'true'
    runs-on: [self-hosted, macOS, ARM64, signalpatch]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: intake-evidence
          path: .ai/runs/intake
      - name: Build a self-contained output schema
        run: |
          node scripts/ai/bundle-schema.mjs \
            .ai/schemas/intake-output.schema.json \
            .ai/schemas/issue-contract.schema.json \
            > .ai/runs/intake/output-schema.json
      - name: Render untrusted input as data
        run: |
          node scripts/ai/render-prompt.mjs \
            --stage intake \
            --evidence .ai/runs/intake/evidence.json \
            > .ai/runs/intake/prompt.md
      - name: Qualify Feedback with Codex
        run: |
          env -i \
            HOME="$HOME" \
            PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin" \
            /Applications/ChatGPT.app/Contents/Resources/codex exec \
            --ephemeral \
            --sandbox read-only \
            --output-schema .ai/runs/intake/output-schema.json \
            --output-last-message .ai/runs/intake/result.json \
            - < .ai/runs/intake/prompt.md
      - name: Validate Intake output
        run: >-
          node scripts/ai/validate-json.mjs
          .ai/schemas/intake-output.schema.json
          .ai/runs/intake/result.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: intake-result
          path: .ai/runs/intake/result.json
          retention-days: 1

  publish:
    needs: qualify
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: intake-result
          path: .ai/runs/intake
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: intake-state
          path: .ai/runs/intake
      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.SIGNALPATCH_APP_ID }}
          private-key: ${{ secrets.SIGNALPATCH_APP_PRIVATE_KEY }}
      - name: Publish validated result
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
        run: >-
          node scripts/controllers/intake-publish.mjs
          .ai/runs/intake/result.json
          .ai/runs/intake/state.json
