name: Issue Delivery

# 【做什么】读 Issue 里的 Contract → Codex 改代码 → 机器人推分支并开 Draft PR（R3 则只分析不改码）
# 【何时跑】Issue 被标记为 content:processed；workflow_dispatch 仅用于运维补跑
# 【详见】.github/workflows/README.md
on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number containing a validated Issue Contract
        required: true
        type: string

# Workflow 默认只有读取 Issue Contract 的权限；分支、PR、评论写权限按发布 Job 单独授予。
permissions:
  contents: read
  issues: read

# 同一个 Issue 的标签事件或补跑串行执行，避免并发创建两个 AI 分支或 PR。
concurrency:
  group: issue-delivery-${{ inputs.issue_number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  # 在 GitHub 托管 Runner 中提取 signalpatch-contract 标记块、校验来源并确定风险，不运行 Codex。
  prepare:
    if: github.event_name == 'workflow_dispatch' || github.event.label.name == 'content:processed'
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.context.outputs.issue_number }}
      proceed: ${{ steps.context.outputs.proceed }}
      risk_level: ${{ steps.context.outputs.risk_level }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # prepare-issue.mjs 只接受 content:processed，并从正文提取 contract.json + issue.json。
      - id: context
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ inputs.issue_number || github.event.issue.number }}
        run: |
          node scripts/controllers/prepare-issue.mjs "$ISSUE_NUMBER" .ai/runs/delivery
          proceed=true
          risk_level=$(node -e 'const c=require("./.ai/runs/delivery/contract.json"); process.stdout.write(c.riskLevel)')
          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"
          echo "proceed=$proceed" >> "$GITHUB_OUTPUT"
          echo "risk_level=$risk_level" >> "$GITHUB_OUTPUT"
      # 二次 Schema 校验：prepare 只提取 JSON 字符串，不保证字段语义完整。
      - name: Validate Issue Contract
        run: >-
          node scripts/ai/validate-json.mjs
          .ai/schemas/issue-contract.schema.json
          .ai/runs/delivery/contract.json
      # 下游 build/analyze-r3/publish 共用；retention 7 天便于 Gate/Repair 跨 Run 引用。
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: issue-${{ steps.context.outputs.issue_number }}-contract
          path: .ai/runs/delivery
          retention-days: 7

  # Controller 先把 Issue 标记为执行中；只有这一步完成后才启动 Codex，避免用户看到过时的 ai:ready。
  mark-codex-started:
    needs: prepare
    if: needs.prepare.outputs.proceed == 'true'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.SIGNALPATCH_APP_ID }}
          private-key: ${{ secrets.SIGNALPATCH_APP_PRIVATE_KEY }}
      - name: Mark Codex execution started
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ needs.prepare.outputs.issue_number }}
        run: node scripts/controllers/issue-progress.mjs start "$ISSUE_NUMBER"

  # R0-R2 在无外部写凭据的自托管 Runner 修改工作树；R3 永远不会进入此 Job。
  build:
    needs: [prepare, mark-codex-started]
    if: needs.prepare.outputs.proceed == 'true' && needs.prepare.outputs.risk_level != 'R3'
    runs-on: [self-hosted, macOS, ARM64, signalpatch]
    steps:
      # 从 main 开干净工作树；Builder Patch 是「相对当前 HEAD 的 diff」，尚未 push 任何 AI 分支。
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      # contract.json 约束 allowedPaths/risk；issue.json 仅含 number/title/url 供 Prompt 引用。
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: issue-${{ needs.prepare.outputs.issue_number }}-contract
          path: .ai/runs/delivery
      - run: pnpm install --frozen-lockfile
      # --stage build 注入 Contract + Issue 元数据；输出 Builder Prompt，不含 GitHub Token。
      - name: Render Builder prompt
        run: |
          node scripts/ai/render-prompt.mjs \
            --stage build \
            --contract .ai/runs/delivery/contract.json \
            --evidence .ai/runs/delivery/issue.json \
            > .ai/runs/delivery/prompt.md
      # workspace-write：Codex 可改仓库文件，但 env -i 阻断 GH/Supabase/Vercel 凭据。
      - name: Build with Codex
        run: |
          env -i \
            HOME="$HOME" \
            PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin" \
            /Applications/ChatGPT.app/Contents/Resources/codex exec \
            --ephemeral \
            --sandbox workspace-write \
            --output-schema .ai/schemas/delivery-output.schema.json \
            --output-last-message .ai/runs/delivery/result.json \
            - < .ai/runs/delivery/prompt.md
      # validate-diff 对照 Contract 检查路径/风险；change.patch 非空才允许进入 publish Job。
      - name: Enforce paths and risk
        run: |
          # intent-to-add 让未跟踪新文件进入 git diff，否则 allowedPaths 无法约束新增路径。
          git add --intent-to-add -- .
          node scripts/ai/validate-json.mjs \
            .ai/schemas/delivery-output.schema.json \
            .ai/runs/delivery/result.json
          node scripts/ai/validate-diff.mjs \
            --base HEAD \
            --contract .ai/runs/delivery/contract.json
          git diff --binary HEAD -- > .ai/runs/delivery/change.patch
          test -s .ai/runs/delivery/change.patch
      # publish Job 在 Ubuntu 上应用此 patch；Mac Job 不持有 push 凭据。
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: issue-${{ needs.prepare.outputs.issue_number }}-build
          path: |
            .ai/runs/delivery/change.patch
            .ai/runs/delivery/result.json
          retention-days: 7

  # R3 只生成结构化分析，不产生 Patch；复用 Reviewer 的只读阶段规则。
  analyze-r3:
    needs: [prepare, mark-codex-started]
    if: needs.prepare.outputs.proceed == 'true' && needs.prepare.outputs.risk_level == 'R3'
    runs-on: [self-hosted, macOS, ARM64, signalpatch]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          persist-credentials: false
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: issue-${{ needs.prepare.outputs.issue_number }}-contract
          path: .ai/runs/delivery
      - run: pnpm install --frozen-lockfile
      # --stage review 的 Prompt 模板要求只读分析，禁止提出代码改动。
      - name: Render analysis-only prompt
        run: |
          node scripts/ai/render-prompt.mjs \
            --stage review \
            --contract .ai/runs/delivery/contract.json \
            --evidence .ai/runs/delivery/issue.json \
            > .ai/runs/delivery/r3-prompt.md
      - name: Analyze R3 Issue with read-only Codex
        run: |
          env -i \
            HOME="$HOME" \
            PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin" \
            /Applications/ChatGPT.app/Contents/Resources/codex exec \
            --ephemeral \
            --sandbox read-only \
            --output-schema .ai/schemas/delivery-output.schema.json \
            --output-last-message .ai/runs/delivery/r3-analysis.json \
            - < .ai/runs/delivery/r3-prompt.md
      - name: Validate analysis output
        run: >-
          node scripts/ai/validate-json.mjs
          .ai/schemas/delivery-output.schema.json
          .ai/runs/delivery/r3-analysis.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: issue-${{ needs.prepare.outputs.issue_number }}-r3-analysis
          path: .ai/runs/delivery/r3-analysis.json
          retention-days: 7

  # Codex 结束后立即记录结束时间；成功进入验证，失败转人工，均由 Controller 写 Issue。
  mark-codex-finished:
    needs: [prepare, mark-codex-started, build, analyze-r3]
    if: >-
      always() &&
      needs.prepare.outputs.proceed == 'true' &&
      needs.mark-codex-started.result == 'success' &&
      (needs.build.result != 'skipped' || needs.analyze-r3.result != 'skipped')
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.SIGNALPATCH_APP_ID }}
          private-key: ${{ secrets.SIGNALPATCH_APP_PRIVATE_KEY }}
      - name: Mark Codex execution finished
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ needs.prepare.outputs.issue_number }}
          BUILD_RESULT: ${{ needs.build.result }}
          ANALYZE_R3_RESULT: ${{ needs.analyze-r3.result }}
        run: |
          result="$BUILD_RESULT"
          if [[ "$result" == "skipped" ]]; then
            result="$ANALYZE_R3_RESULT"
          fi
          node scripts/controllers/issue-progress.mjs end "$ISSUE_NUMBER" "$result"

  # 分析完成后才在隔离 Job 获取 App Token，把结论写回 Issue 并转为人工处理。
  publish-r3:
    needs: [prepare, analyze-r3, mark-codex-finished]
    if: always() && needs.prepare.result == 'success' && needs.analyze-r3.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: issue-${{ needs.prepare.outputs.issue_number }}-r3-analysis
          path: .ai/runs/delivery
      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.SIGNALPATCH_APP_ID }}
          private-key: ${{ secrets.SIGNALPATCH_APP_PRIVATE_KEY }}
      # r3-analysis.json 整段作为评论正文；移除 ai:ready 表示不再自动交付。
      - name: Publish analysis without modifying code
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh issue comment "${{ needs.prepare.outputs.issue_number }}" \
            --body-file .ai/runs/delivery/r3-analysis.json
          gh issue edit "${{ needs.prepare.outputs.issue_number }}" \
            --remove-label "ai:ready" \
            --add-label "ai:human-required"

  # Controller 在干净 main 上应用 build Job 已校验的 Patch，push 后开 Draft PR（非 Ready，合并由 pr-outcome 负责）。
  publish:
    needs: [prepare, build, mark-codex-finished]
    if: always() && needs.prepare.result == 'success' && needs.build.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: issue-${{ needs.prepare.outputs.issue_number }}-contract
          path: .ai/runs/delivery
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: issue-${{ needs.prepare.outputs.issue_number }}-build
          path: .ai/runs/delivery
      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.SIGNALPATCH_APP_ID }}
          private-key: ${{ secrets.SIGNALPATCH_APP_PRIVATE_KEY }}
      - name: Validate and publish AI branch
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          ISSUE_NUMBER: ${{ needs.prepare.outputs.issue_number }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
        run: |
          branch="ai/issue-${ISSUE_NUMBER}-delivery"
          git checkout -b "$branch"
          git apply --index .ai/runs/delivery/change.patch
          # Artifact 跨越 Mac→Ubuntu 信任边界，apply 后必须对即将提交的工作树再跑同一 validate-diff。
          node scripts/ai/validate-diff.mjs \
            --base HEAD \
            --contract .ai/runs/delivery/contract.json
          git config user.name "signalpatch-automation[bot]"
          git config user.email "signalpatch-automation[bot]@users.noreply.github.com"
          git commit -m "fix: deliver SignalPatch issue #${ISSUE_NUMBER}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --set-upstream origin "$branch"
          # --draft：PR 创建后触发 pr-gate，但不表示可合并；用户 Repair Status 进入 BUILDING。
          pr_url=$(gh pr create \
            --draft \
            --base main \
            --head "$branch" \
            --title "AI delivery for #${ISSUE_NUMBER}" \
            --body "Refs #${ISSUE_NUMBER}")
          pr_number=$(gh pr view "$pr_url" --json number --jq .number)
          node scripts/controllers/record-run.mjs \
            --issue "$ISSUE_NUMBER" \
            --stage build \
            --state SUCCEEDED \
            --head-sha "$(git rev-parse HEAD)" \
            --pr "$pr_number" \
            --contract .ai/runs/delivery/contract.json
