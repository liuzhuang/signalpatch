name: PR Gate

# 【做什么】PR 每次更新跑 verify/build/AI 审查/预览部署+Smoke；结果只驱动自动化自身，不是仓库合并门禁
# 【何时跑】PR 打开、重开、或有新 push 时（无手动触发）
# 【详见】.github/workflows/README.md
on:
  pull_request:
    types: [opened, synchronize, reopened]

# 默认只读。部署凭据仅在 preview-smoke 的步骤环境中出现，Reviewer Codex 所在 Job 无法继承。
permissions:
  contents: read
  issues: read
  pull-requests: read

# 同一 PR 推送新 Head 时取消旧 Gate，避免旧 SHA 的验证结果或部署继续参与验收。
concurrency:
  group: pr-gate-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  # 在任何构建或 Secret 使用前验证 PR 来源，并把后续所有 Job 固定到事件中的 Head SHA。
  trust:
    runs-on: ubuntu-latest
    outputs:
      issue_number: ${{ steps.verify.outputs.issue_number }}
      head_sha: ${{ steps.verify.outputs.head_sha }}
      mode: ${{ steps.verify.outputs.mode }}
      risk_level: ${{ steps.verify.outputs.risk_level }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      # 分支名 ai/issue-{n}-* + App Bot → automation（prepare-issue 拉 Contract）；codex/* + owner → manual(R2)。
      - id: verify
        env:
          APP_BOT: ${{ vars.SIGNALPATCH_APP_BOT }}
          GH_TOKEN: ${{ github.token }}
          HEAD_REF: ${{ github.event.pull_request.head.ref }}
          HEAD_REPOSITORY: ${{ github.event.pull_request.head.repo.full_name }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          # Fork PR 一律拒绝；自动分支还必须同时匹配 issue 编号格式和专用 App Bot 作者。
          [[ "$HEAD_REPOSITORY" == "$GITHUB_REPOSITORY" ]]
          if [[ "$HEAD_REF" =~ ^ai/issue-([0-9]+)- ]] && [[ "$PR_AUTHOR" == "$APP_BOT" ]]; then
            mode=automation
            issue_number="${BASH_REMATCH[1]}"
            node scripts/controllers/prepare-issue.mjs "$issue_number" .ai/runs/gate
            risk_level=$(node -e 'const c=require("./.ai/runs/gate/contract.json"); process.stdout.write(c.riskLevel)')
            echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"
          # 仓库所有者创建的 codex/* PR 走人工 R2 路径，不伪造自动化 Issue Contract。
          elif [[ "$HEAD_REF" =~ ^codex/ ]] && [[ "$PR_AUTHOR" == "$REPOSITORY_OWNER" ]]; then
            mode=manual
            risk_level=R2
          else
            echo "PR source is not trusted for this gate" >&2
            exit 1
          fi
          echo "head_sha=$HEAD_SHA" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "risk_level=$risk_level" >> "$GITHUB_OUTPUT"
      # independent-review 与 preview-smoke(record-run) 需要 Contract；manual 路径不上传。
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: steps.verify.outputs.mode == 'automation'
        with:
          name: pr-${{ github.event.pull_request.number }}-contract
          path: .ai/runs/gate
          retention-days: 7

  # 格式、Lint、类型、单测、SQL 与 Workflow 结构校验的统一入口。
  verify:
    needs: trust
    runs-on: ubuntu-latest
    steps:
      # 固定到 trust 输出的 head_sha，不用默认 merge commit，保证验的是 PR 分支 tip。
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.trust.outputs.head_sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Verify
        run: pnpm verify

  # 独立执行生产构建，不能用 verify 成功替代可部署性证明。
  build:
    needs: trust
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.trust.outputs.head_sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build
        run: pnpm build

  # 自动化 PR 才运行独立只读 Codex；它只看 Contract 和当前 Diff，不持任何外部写凭据。
  independent-review:
    needs: trust
    if: needs.trust.outputs.mode == 'automation'
    name: independent-review
    runs-on: [self-hosted, macOS, ARM64, signalpatch]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.trust.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: false
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pr-${{ github.event.pull_request.number }}-contract
          path: .ai/runs/gate
      # origin/main...HEAD 三点 diff：Reviewer 只看 PR 净变更，不读完整 Git 历史。
      - name: Prepare bounded review evidence
        run: |
          git diff --binary origin/main...HEAD -- > .ai/runs/gate/pr.diff
          node scripts/ai/render-prompt.mjs \
            --stage review \
            --contract .ai/runs/gate/contract.json \
            --evidence .ai/runs/gate/pr.diff \
            > .ai/runs/gate/review-prompt.md
      - name: Review with independent Codex
        run: |
          env -i \
            HOME="$HOME" \
            PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin" \
            /Applications/ChatGPT.app/Contents/Resources/codex exec \
            --ephemeral \
            --sandbox read-only \
            --output-schema .ai/schemas/delivery-output.schema.json \
            --output-last-message .ai/runs/gate/review.json \
            - < .ai/runs/gate/review-prompt.md
      # decision 必须为 APPROVE；REJECT/REQUEST_CHANGES 会进入 Outcome Repair 链。
      - name: Require approval
        run: |
          node scripts/ai/validate-json.mjs \
            .ai/schemas/delivery-output.schema.json \
            .ai/runs/gate/review.json
          node -e 'const r=require("./.ai/runs/gate/review.json"); if(r.decision!=="APPROVE") process.exit(1)'
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pr-${{ github.event.pull_request.number }}-review
          path: .ai/runs/gate/review.json
          retention-days: 7

  # codex/* 手工 PR 固定按 R2 处理；environment reviewer 是真正的人工批准门，而非空跑检查。
  manual-independent-review:
    needs: trust
    if: needs.trust.outputs.mode == 'manual'
    name: independent-review
    runs-on: ubuntu-latest
    environment: r2-approval
    steps:
      # PR 检查名与 automation 路径相同，便于统一观察两条路径。
      - name: Confirm independent R2 approval
        run: true

  # 自动和手工路径共享同名 preview-smoke，但前置审查二选一；always() 让被跳过的另一分支不阻塞。
  preview-smoke:
    needs: [trust, verify, build, independent-review, manual-independent-review]
    if: >-
      always() && needs.trust.result == 'success' && needs.verify.result == 'success' && needs.build.result == 'success' && ((needs.trust.outputs.mode == 'automation' && needs.independent-review.result == 'success') || (needs.trust.outputs.mode == 'manual' && needs.manual-independent-review.result == 'success'))
    name: preview-smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.trust.outputs.head_sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      # manual 路径无 Issue Contract，preview-smoke 只做部署+Smoke，不写 Supabase Automation Run。
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        if: needs.trust.outputs.mode == 'automation'
        with:
          name: pr-${{ github.event.pull_request.number }}-contract
          path: .ai/runs/gate
      - run: pnpm install --frozen-lockfile
      # production 环境变量构建 + --skip-domain：得到与生产相同产物，但不切生产域名；URL 写入 deployment.json。
      - name: Build staged production artifact once
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          mkdir -p .ai/runs/gate
          pnpm exec vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          pnpm exec vercel build --prod --token="$VERCEL_TOKEN"
          deployment_url=$(pnpm exec vercel deploy --prebuilt --prod --skip-domain --yes --token="$VERCEL_TOKEN")
          DEPLOYMENT_URL="$deployment_url" HEAD_SHA="${{ needs.trust.outputs.head_sha }}" \
            node -e 'const fs=require("fs"); fs.writeFileSync(".ai/runs/gate/deployment.json", JSON.stringify({deploymentUrl:process.env.DEPLOYMENT_URL,headSha:process.env.HEAD_SHA},null,2)+"\n")'
      # Playwright Smoke 对 staged URL 跑验收；tracking ID 写入 smoke-tracking-ids.txt 供 Outcome 清理。
      - name: Smoke test staged deployment
        env:
          SMOKE_TRACKING_IDS_FILE: .ai/runs/gate/smoke-tracking-ids.txt
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
        run: >-
          pnpm test:smoke --
          --base-url="$(node -p 'require("./.ai/runs/gate/deployment.json").deploymentUrl')"
      # Repair Status → VERIFYING；preview URL 供用户查询，非生产域名。
      - name: Record accepted staged deployment
        if: needs.trust.outputs.mode == 'automation'
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
        run: |
          node scripts/controllers/record-run.mjs \
            --issue "${{ needs.trust.outputs.issue_number }}" \
            --stage preview \
            --state SUCCEEDED \
            --head-sha "${{ needs.trust.outputs.head_sha }}" \
            --pr "${{ github.event.pull_request.number }}" \
            --preview-url "$(node -p 'require("./.ai/runs/gate/deployment.json").deploymentUrl')" \
            --contract .ai/runs/gate/contract.json
      # pr-outcome finalize 从同一 workflow_run.id 下载此 Artifact 做 vercel promote，不重新 build。
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: pr-${{ github.event.pull_request.number }}-deployment
          path: |
            .ai/runs/gate/deployment.json
            .ai/runs/gate/smoke-tracking-ids.txt
          retention-days: 7
