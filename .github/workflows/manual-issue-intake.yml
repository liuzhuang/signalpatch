name: Manual Issue Intake

# 【做什么】评估用户创建或补充的手工 Issue，并原地评论或晋升
# 【何时跑】Issue 创建/编辑/标记、用户评论创建/编辑/删除；workflow_dispatch 仅用于运维补跑
on:
  issues:
    types: [opened, edited, labeled, reopened]
  issue_comment:
    types: [created, edited, deleted]
  workflow_dispatch:
    inputs:
      issue_number:
        description: Issue number to process; empty means the oldest raw Issue
        required: false
        type: string

permissions:
  contents: read

concurrency:
  # 同一 Issue 的真实上下文事件串行；Bot 评论和非 raw 标签 Run 使用 run_id，不能替换有效 pending Run。
  group: >-
    manual-issue-intake-${{
      (
        github.event_name == 'workflow_dispatch' ||
        (
          github.event_name == 'issues' &&
          (
            (github.event.sender.type != 'Bot' && (github.event.action != 'labeled' || github.event.label.name == 'content:raw')) ||
            (github.event.action == 'labeled' && github.event.label.name == 'content:raw' && contains(github.event.issue.labels.*.name, 'source:manual'))
          )
        ) ||
        (github.event_name == 'issue_comment' && github.event.sender.type != 'Bot' && github.event.comment.user.type != 'Bot')
      ) &&
      (inputs.issue_number || github.event.issue.number || 'scan') ||
      github.run_id
    }}
  cancel-in-progress: false

jobs:
  collect:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'issues' &&
        github.event.issue.state == 'open' &&
        github.event.issue.pull_request == null &&
        (
          github.event.sender.type != 'Bot' ||
          (
            github.event.action == 'labeled' &&
            github.event.label.name == 'content:raw' &&
            contains(github.event.issue.labels.*.name, 'source:manual')
          )
        ) &&
        github.event.issue.user.type != 'Bot' &&
        !contains(github.event.issue.labels.*.name, 'duplicate') &&
        !contains(github.event.issue.body, '<!-- signalpatch-feedback:') &&
        !contains(github.event.issue.body, '<!-- signalpatch-conversation-request:') &&
        (
          (
            !contains(github.event.issue.labels.*.name, 'content:processed') &&
            !contains(github.event.issue.body, '<!-- signalpatch-contract:start -->')
          ) ||
          (
            contains(github.event.issue.labels.*.name, 'content:processed') &&
            contains(github.event.issue.labels.*.name, 'ai:ready') &&
            contains(github.event.issue.labels.*.name, 'source:manual')
          )
        ) &&
        (github.event.action != 'labeled' || github.event.label.name == 'content:raw')
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.state == 'open' &&
        github.event.issue.pull_request == null &&
        github.event.sender.type != 'Bot' &&
        github.event.issue.user.type != 'Bot' &&
        github.event.comment.user.type != 'Bot' &&
        !contains(github.event.issue.labels.*.name, 'duplicate') &&
        !contains(github.event.issue.body, '<!-- signalpatch-feedback:') &&
        !contains(github.event.issue.body, '<!-- signalpatch-conversation-request:') &&
        (
          (
            !contains(github.event.issue.labels.*.name, 'content:processed') &&
            !contains(github.event.issue.body, '<!-- signalpatch-contract:start -->')
          ) ||
          (
            contains(github.event.issue.labels.*.name, 'content:processed') &&
            contains(github.event.issue.labels.*.name, 'ai:ready') &&
            contains(github.event.issue.labels.*.name, 'source:manual')
          )
        )
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: read
    outputs:
      has_issue: ${{ steps.scan.outputs.has_issue }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - id: scan
        name: Load the triggering raw Issue
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SIGNALPATCH_APP_BOT: ${{ vars.SIGNALPATCH_APP_BOT }}
          SIGNALPATCH_EVENT_ACTION: ${{ github.event.action }}
        run: |
          node scripts/controllers/manual-issue-intake-collect.mjs \
            "${{ inputs.issue_number || github.event.issue.number || '' }}" \
            .ai/runs/manual-issue-intake
          if [[ -f .ai/runs/manual-issue-intake/empty ]]; then
            echo "has_issue=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_issue=true" >> "$GITHUB_OUTPUT"
          fi
      - if: steps.scan.outputs.has_issue == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: manual-issue-intake-evidence
          path: .ai/runs/manual-issue-intake/evidence.json
          retention-days: 1
      - if: steps.scan.outputs.has_issue == 'true'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: manual-issue-intake-state
          path: .ai/runs/manual-issue-intake/state.json
          retention-days: 1

  qualify:
    needs: collect
    if: needs.collect.outputs.has_issue == 'true'
    runs-on: [self-hosted, macOS, ARM64, signalpatch]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: manual-issue-intake-evidence
          path: .ai/runs/manual-issue-intake
      - name: Build a self-contained output schema
        run: |
          node scripts/ai/bundle-schema.mjs \
            .ai/schemas/intake-output.schema.json \
            .ai/schemas/issue-contract.schema.json \
            > .ai/runs/manual-issue-intake/output-schema.json
      - name: Render untrusted Issue input as data
        run: |
          node scripts/ai/render-prompt.mjs \
            --stage intake \
            --evidence .ai/runs/manual-issue-intake/evidence.json \
            > .ai/runs/manual-issue-intake/prompt.md
      - name: Qualify existing Issue with read-only Codex
        run: |
          env -i \
            HOME="$HOME" \
            PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin" \
            /Applications/ChatGPT.app/Contents/Resources/codex exec \
            --ephemeral \
            --sandbox read-only \
            --output-schema .ai/runs/manual-issue-intake/output-schema.json \
            --output-last-message .ai/runs/manual-issue-intake/result.json \
            - < .ai/runs/manual-issue-intake/prompt.md
      - name: Validate Intake output
        run: >-
          node scripts/ai/validate-json.mjs
          .ai/schemas/intake-output.schema.json
          .ai/runs/manual-issue-intake/result.json
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: manual-issue-intake-result
          path: .ai/runs/manual-issue-intake/result.json
          retention-days: 1

  publish:
    needs: qualify
    if: needs.qualify.result == 'success'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: manual-issue-intake-result
          path: .ai/runs/manual-issue-intake
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: manual-issue-intake-state
          path: .ai/runs/manual-issue-intake
      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.SIGNALPATCH_APP_ID }}
          private-key: ${{ secrets.SIGNALPATCH_APP_PRIVATE_KEY }}
      - name: Update the existing Issue only
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          SIGNALPATCH_APP_BOT: ${{ vars.SIGNALPATCH_APP_BOT }}
        run: |
          node scripts/controllers/manual-issue-intake-publish.mjs \
            .ai/runs/manual-issue-intake/result.json \
            .ai/runs/manual-issue-intake/state.json
