name: PR Outcome

# 【做什么】PR Gate 结束后：全绿则合并+上生产+关 Issue；失败则自动修 PR（最多约 3 次）或转人工
# 【何时跑】名为「PR Gate」的 workflow 跑完时（监听 workflow_run，不是 PR 事件本身）
# 【详见】.github/workflows/README.md
on:
  workflow_run:
    workflows: [PR Gate]
    types: [completed]
  workflow_dispatch:
    inputs:
      gate_run_id:
        description: Successful PR Gate run ID to finalize
        required: true
        type: string

# 顶层保持只读；重跑、Repair 发布、合并和 Issue 更新分别在需要的 Job 中提升权限。
permissions:
  actions: read
  contents: read
  issues: read
  pull-requests: read

# 一个 Gate Run 只处理一次 Outcome；失败后的新提交会产生新的 PR Gate 和新的 workflow_run.id。
concurrency:
  group: pr-outcome-${{ inputs.gate_run_id || github.event.workflow_run.id }}
  cancel-in-progress: false

jobs:
  # 不信任 workflow_run 附带的 PR 摘要：重新查询唯一 PR，并确认它仍指向触发 Gate 的同一 SHA。
  trust:
    runs-on: ubuntu-latest
    outputs:
      branch: ${{ steps.verify.outputs.branch }}
      conclusion: ${{ steps.verify.outputs.conclusion }}
      head_sha: ${{ steps.verify.outputs.head_sha }}
      issue_number: ${{ steps.verify.outputs.issue_number }}
      mode: ${{ steps.verify.outputs.mode }}
      pr_number: ${{ steps.verify.outputs.pr_number }}
      risk_level: ${{ steps.verify.outputs.risk_level }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      # 实时 gh api 查 PR：校验 pull_requests 长度为 1、非 Fork、head.sha 与 workflow_run.head_sha 一致。
      - id: verify
        env:
          APP_BOT: ${{ vars.SIGNALPATCH_APP_BOT }}
          GH_TOKEN: ${{ github.token }}
          GATE_RUN_ID: ${{ inputs.gate_run_id || github.event.workflow_run.id }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          gate_run=$(gh api "repos/${GITHUB_REPOSITORY}/actions/runs/${GATE_RUN_ID}")
          RUN_CONCLUSION=$(node -e 'const r=JSON.parse(process.argv[1]); process.stdout.write(r.conclusion)' "$gate_run")
          RUN_HEAD_SHA=$(node -e 'const r=JSON.parse(process.argv[1]); process.stdout.write(r.head_sha)' "$gate_run")
          RUN_PULL_REQUESTS=$(node -e 'const r=JSON.parse(process.argv[1]); process.stdout.write(JSON.stringify(r.pull_requests))' "$gate_run")
          if [[ $(node -e 'const p=JSON.parse(process.argv[1]); process.stdout.write(String(p.length))' "$RUN_PULL_REQUESTS") != "1" ]]; then
            RUN_PULL_REQUESTS=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${RUN_HEAD_SHA}/pulls")
          fi
          # 没有关联 PR 或关联多个 PR 都安全失败，防止把结果写到无法唯一归属的变更上。
          [[ $(node -e 'const p=JSON.parse(process.argv[1]); process.stdout.write(String(p.length))' "$RUN_PULL_REQUESTS") == "1" ]]
          pr_number=$(node -e 'const p=JSON.parse(process.argv[1]); process.stdout.write(String(p[0].number))' "$RUN_PULL_REQUESTS")
          pr=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${pr_number}")
          branch=$(node -e 'const p=JSON.parse(process.argv[1]); process.stdout.write(p.head.ref)' "$pr")
          head_sha=$(node -e 'const p=JSON.parse(process.argv[1]); process.stdout.write(p.head.sha)' "$pr")
          head_repo=$(node -e 'const p=JSON.parse(process.argv[1]); process.stdout.write(p.head.repo.full_name)' "$pr")
          author=$(node -e 'const p=JSON.parse(process.argv[1]); process.stdout.write(p.user.login)' "$pr")
          [[ "$head_repo" == "$GITHUB_REPOSITORY" ]]
          [[ "$head_sha" == "$RUN_HEAD_SHA" ]]
          if [[ "$branch" =~ ^ai/issue-([0-9]+)- ]] && [[ "$author" == "$APP_BOT" ]]; then
            mode=automation
            issue_number="${BASH_REMATCH[1]}"
            node scripts/controllers/prepare-issue.mjs "$issue_number" .ai/runs/outcome
            risk_level=$(node -e 'const c=require("./.ai/runs/outcome/contract.json"); process.stdout.write(c.riskLevel)')
          # 手工 codex/* PR 仅运行自动化验收；本 Workflow 不替它自动合并或发布。
          elif [[ "$branch" =~ ^codex/ ]] && [[ "$author" == "$REPOSITORY_OWNER" ]]; then
            mode=manual
            risk_level=R2
          else
            echo "PR source is not trusted for this outcome" >&2
            exit 1
          fi
          echo "branch=$branch" >> "$GITHUB_OUTPUT"
          echo "conclusion=$RUN_CONCLUSION" >> "$GITHUB_OUTPUT"
          echo "head_sha=$head_sha" >> "$GITHUB_OUTPUT"
          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          if [[ "$mode" == automation ]]; then
            echo "issue_number=$issue_number" >> "$GITHUB_OUTPUT"
          fi
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"
          echo "risk_level=$risk_level" >> "$GITHUB_OUTPUT"
      # finalize / repair 链需要 Contract；conclusion 决定走成功路径还是 collect-failure。
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        if: steps.verify.outputs.mode == 'automation'
        with:
          name: outcome-contract
          path: .ai/runs/outcome
          retention-days: 7

  # 只处理 automation 且 Gate 非 success：拉失败日志、算指纹、区分基础设施 vs 应用失败。
  collect-failure:
    needs: trust
    if: needs.trust.outputs.mode == 'automation' && needs.trust.outputs.conclusion != 'success'
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    outputs:
      failure_kind: ${{ steps.classify.outputs.failure_kind }}
      fingerprint: ${{ steps.classify.outputs.fingerprint }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      # Reviewer 的结构化输出即使 decision 拒绝也必须上传；缺失时继续使用普通失败摘要。
      - name: Download structured Reviewer evidence
        continue-on-error: true
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pr-${{ needs.trust.outputs.pr_number }}-review
          path: .ai/runs/outcome/reviewer
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.gate_run_id || github.event.workflow_run.id }}
      # failure-fingerprint.mjs 规范化日志后 SHA256；compose-repair-evidence.mjs 再附加有界 Reviewer findings。
      - id: classify
        env:
          GH_TOKEN: ${{ github.token }}
          RUN_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
          RUN_ID: ${{ inputs.gate_run_id || github.event.workflow_run.id }}
        run: |
          mkdir -p .ai/runs/outcome
          gh run view "$RUN_ID" --log-failed > .ai/runs/outcome/failure.log
          reviewer_evidence_missing=false
          if grep -Fq "Require approval" .ai/runs/outcome/failure.log && \
            [[ ! -s .ai/runs/outcome/reviewer/review.json ]]; then
            echo "Reviewer rejected the PR, but its structured evidence artifact is missing." >&2
            reviewer_evidence_missing=true
          fi
          node scripts/ai/failure-fingerprint.mjs \
            < .ai/runs/outcome/failure.log \
            > .ai/runs/outcome/failure.json
          node scripts/ai/compose-repair-evidence.mjs \
            .ai/runs/outcome/failure.json \
            .ai/runs/outcome/reviewer/review.json \
            > .ai/runs/outcome/repair-evidence.json
          node scripts/ai/classify-failure.mjs \
            .ai/runs/outcome/failure.log \
            > .ai/runs/outcome/classification.json
          kind=$(node -p 'require("./.ai/runs/outcome/classification.json").kind')
          if [[ "$reviewer_evidence_missing" == "true" ]]; then
            kind="evidence-missing"
          fi
          fingerprint=$(node -p 'require("./.ai/runs/outcome/repair-evidence.json").fingerprint')
          echo "failure_kind=$kind" >> "$GITHUB_OUTPUT"
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"
          # 基础设施故障只原样重跑一次，不让 Codex 修改业务代码来掩盖 Runner 或网络问题。
          if [[ "$kind" == "infrastructure" && "$RUN_ATTEMPT" == "1" ]]; then
            gh run rerun "$RUN_ID" --failed
          fi
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: failure-evidence
          path: .ai/runs/outcome
          retention-days: 7

  # 只有 application 失败进入 Repair；Codex 在当前 PR Head 上做一次聚焦修改，仍不接触外部写凭据。
  repair:
    needs: [trust, collect-failure]
    if: needs.trust.outputs.mode == 'automation' && needs.collect-failure.outputs.failure_kind == 'application'
    runs-on: [self-hosted, macOS, ARM64, signalpatch]
    steps:
      # 检出 PR tip（非 main），Repair patch 叠加在已有 Delivery+历史 Repair 提交之上。
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.trust.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: false
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: outcome-contract
          path: .ai/runs/outcome
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: failure-evidence
          path: .ai/runs/outcome
      # check-repair-budget：attempt 1-3；提交历史含相同 failure: 指纹则不再调用 Codex。
      - name: Enforce bounded Repair
        env:
          FINGERPRINT: ${{ needs.collect-failure.outputs.fingerprint }}
        run: |
          # origin/main 之后第一条是 Builder 提交，其余才是 Repair；由此计算下一次尝试编号。
          repair_count=$(($(git rev-list --count origin/main..HEAD) - 1))
          next_attempt=$((repair_count + 1))
          node scripts/ai/check-repair-budget.mjs "$next_attempt" "$FINGERPRINT"
          ! git log --format=%B origin/main..HEAD | grep -Fq "failure:${FINGERPRINT}"
      # repair-evidence.json 含截断日志摘要和结构化 Reviewer findings。
      - name: Render Repair prompt
        run: |
          node scripts/ai/render-prompt.mjs \
            --stage repair \
            --contract .ai/runs/outcome/contract.json \
            --evidence .ai/runs/outcome/repair-evidence.json \
            > .ai/runs/outcome/repair-prompt.md
      - name: Repair with Codex
        run: |
          env -i \
            HOME="$HOME" \
            PATH="/opt/homebrew/bin:/usr/local/bin:/usr/bin:/bin" \
            /Applications/ChatGPT.app/Contents/Resources/codex exec \
            --ephemeral \
            --sandbox workspace-write \
            --output-schema .ai/schemas/delivery-output.schema.json \
            --output-last-message .ai/runs/outcome/repair.json \
            - < .ai/runs/outcome/repair-prompt.md
      - name: Validate Repair patch
        run: |
          git add --intent-to-add -- .
          node scripts/ai/validate-json.mjs \
            .ai/schemas/delivery-output.schema.json \
            .ai/runs/outcome/repair.json
          node scripts/ai/validate-diff.mjs \
            --base HEAD \
            --contract .ai/runs/outcome/contract.json
          git diff --binary HEAD -- > .ai/runs/outcome/repair.patch
          test -s .ai/runs/outcome/repair.patch
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: repair-patch
          path: |
            .ai/runs/outcome/repair.patch
            .ai/runs/outcome/repair.json
          retention-days: 7

  # 在独立 Ubuntu Job 应用 Patch、复验策略，再由短时 App Token 推送到原 PR 分支触发下一轮 Gate。
  publish-repair:
    needs: [trust, collect-failure, repair]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.trust.outputs.head_sha }}
          fetch-depth: 0
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: outcome-contract
          path: .ai/runs/outcome
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: repair-patch
          path: .ai/runs/outcome
      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.SIGNALPATCH_APP_ID }}
          private-key: ${{ secrets.SIGNALPATCH_APP_PRIVATE_KEY }}
      # commit body 含 failure:{fingerprint}；push 到 trust 记录的 branch 会触发新的 PR Gate synchronize。
      - name: Publish validated Repair
        env:
          FINGERPRINT: ${{ needs.collect-failure.outputs.fingerprint }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
        run: |
          attempt=$(git rev-list --count origin/main..HEAD)
          git apply --index .ai/runs/outcome/repair.patch
          node scripts/ai/validate-diff.mjs \
            --base HEAD \
            --contract .ai/runs/outcome/contract.json
          git config user.name "signalpatch-automation[bot]"
          git config user.email "signalpatch-automation[bot]@users.noreply.github.com"
          git commit -m "fix: bounded AI repair

          failure:${FINGERPRINT}"
          git remote set-url origin "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push origin "HEAD:${{ needs.trust.outputs.branch }}"
          node scripts/controllers/record-run.mjs \
            --issue "${{ needs.trust.outputs.issue_number }}" \
            --stage repair \
            --state SUCCEEDED \
            --head-sha "$(git rev-parse HEAD)" \
            --attempt "$attempt" \
            --pr "${{ needs.trust.outputs.pr_number }}" \
            --failure-fingerprint "$FINGERPRINT" \
            --contract .ai/runs/outcome/contract.json
          gh issue edit "${{ needs.trust.outputs.issue_number }}" --add-label "ai:repairing"

  # Repair 的次数、重复指纹、空 Diff 或策略检查失败都收敛到人工处理，不无限重启。
  mark-human-required:
    needs: [trust, collect-failure, repair]
    if: always() && needs.trust.outputs.mode == 'automation' && (needs.collect-failure.outputs.failure_kind == 'evidence-missing' || (needs.collect-failure.outputs.failure_kind == 'application' && needs.repair.result == 'failure'))
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.SIGNALPATCH_APP_ID }}
          private-key: ${{ secrets.SIGNALPATCH_APP_PRIVATE_KEY }}
      - name: Stop the bounded Repair loop
        env:
          FAILURE_KIND: ${{ needs.collect-failure.outputs.failure_kind }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          if [[ "$FAILURE_KIND" == "evidence-missing" ]]; then
            reason="The independent Reviewer rejected this PR, but its structured evidence artifact is missing. Human review is required."
          else
            reason="The bounded Repair loop stopped because its policy or attempt guard failed. Human review is required."
          fi
          gh issue edit "${{ needs.trust.outputs.issue_number }}" \
            --repo "$GITHUB_REPOSITORY" \
            --add-label "ai:human-required"
          gh issue comment "${{ needs.trust.outputs.issue_number }}" \
            --repo "$GITHUB_REPOSITORY" \
            --body "$reason"

  # 仅 automation 且 Gate conclusion=success：合并、promote Gate 已测 Deployment、Production Smoke、关 Issue。
  finalize:
    needs: trust
    if: needs.trust.outputs.mode == 'automation' && needs.trust.outputs.conclusion == 'success'
    runs-on: ubuntu-latest
    environment: ${{ needs.trust.outputs.risk_level == 'R2' && 'r2-approval' || 'production' }}
    permissions:
      actions: read
      contents: write
      issues: write
      pull-requests: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ needs.trust.outputs.head_sha }}
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: outcome-contract
          path: .ai/runs/outcome
      - run: pnpm exec playwright install --with-deps chromium
      # 从触发本 Outcome 的那次 PR Gate Run 下载 preview-smoke 产物（非当前 Run 的 Artifact）。
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: pr-${{ needs.trust.outputs.pr_number }}-deployment
          path: .ai/runs/outcome
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ inputs.gate_run_id || github.event.workflow_run.id }}
      # 防止 Gate 结束后 PR 又被 push：若 head 已变，不签发 App Token 做 merge/promote。
      - name: Revalidate current PR head before reading write credentials
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          current=$(gh api "repos/${GITHUB_REPOSITORY}/pulls/${{ needs.trust.outputs.pr_number }}" --jq .head.sha)
          [[ "$current" == "${{ needs.trust.outputs.head_sha }}" ]]
      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.SIGNALPATCH_APP_ID }}
          private-key: ${{ secrets.SIGNALPATCH_APP_PRIVATE_KEY }}
      # Draft PR → Ready → squash merge，--match-head-commit 保证合的是 Gate 验过的 SHA。
      - name: Merge accepted PR
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          pr_state=$(gh pr view "${{ needs.trust.outputs.pr_number }}" --json state --jq .state)
          if [[ "$pr_state" != "MERGED" ]]; then
            gh pr ready "${{ needs.trust.outputs.pr_number }}"
            gh pr merge "${{ needs.trust.outputs.pr_number }}" \
              --squash \
              --match-head-commit "${{ needs.trust.outputs.head_sha }}"
          fi
      # promote 同一 deploymentUrl；Production Smoke 失败则 rollback + HUMAN_REQUIRED，不关 Issue。
      - name: Promote the exact accepted deployment
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PRODUCTION_URL: ${{ vars.PRODUCTION_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SUPABASE_URL: ${{ vars.SUPABASE_URL }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          deployment_url=$(node -p 'require("./.ai/runs/outcome/deployment.json").deploymentUrl')
          promote_status=0
          promote_output=$(pnpm exec vercel promote "$deployment_url" --yes --token="$VERCEL_TOKEN" 2>&1) || promote_status=$?
          printf '%s\n' "$promote_output"
          if [[ "$promote_status" != "0" ]] && ! grep -Fq "already the current production deployment" <<< "$promote_output"; then
            exit "$promote_status"
          fi
          if ! SMOKE_TRACKING_IDS_FILE=.ai/runs/outcome/smoke-tracking-ids.txt \
            pnpm test:smoke -- --base-url="$PRODUCTION_URL"; then
            pnpm exec vercel rollback --yes --token="$VERCEL_TOKEN" || true
            node scripts/controllers/cleanup-smoke.mjs .ai/runs/outcome/smoke-tracking-ids.txt || true
            node scripts/controllers/record-run.mjs \
              --issue "${{ needs.trust.outputs.issue_number }}" \
              --stage production \
              --state HUMAN_REQUIRED \
              --head-sha "${{ needs.trust.outputs.head_sha }}" \
              --pr "${{ needs.trust.outputs.pr_number }}" \
              --preview-url "$deployment_url" \
              --production-url "$PRODUCTION_URL" \
              --contract .ai/runs/outcome/contract.json
            gh issue edit "${{ needs.trust.outputs.issue_number }}" --add-label "ai:human-required"
            gh issue comment "${{ needs.trust.outputs.issue_number }}" --body "Production Smoke Test failed. Vercel rollback was requested."
            exit 1
          fi
          node scripts/controllers/cleanup-smoke.mjs .ai/runs/outcome/smoke-tracking-ids.txt
          node scripts/controllers/record-run.mjs \
            --issue "${{ needs.trust.outputs.issue_number }}" \
            --stage production \
            --state SUCCEEDED \
            --head-sha "${{ needs.trust.outputs.head_sha }}" \
            --pr "${{ needs.trust.outputs.pr_number }}" \
            --preview-url "$deployment_url" \
            --production-url "$PRODUCTION_URL" \
            --contract .ai/runs/outcome/contract.json
          node scripts/controllers/final-comment.mjs \
            .ai/runs/outcome/contract.json \
            .ai/runs/outcome/deployment.json \
            "${{ needs.trust.outputs.pr_number }}" \
            "${{ needs.trust.outputs.head_sha }}" \
            "$PRODUCTION_URL" \
            > .ai/runs/outcome/final-comment.md
          gh issue comment "${{ needs.trust.outputs.issue_number }}" --body-file .ai/runs/outcome/final-comment.md
          gh issue edit "${{ needs.trust.outputs.issue_number }}" --add-label "ai:done" --remove-label "ai:building" --remove-label "ai:verifying" --remove-label "ai:repairing"
          gh issue close "${{ needs.trust.outputs.issue_number }}" --reason completed
