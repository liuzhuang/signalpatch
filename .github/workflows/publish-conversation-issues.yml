name: Publish Conversation Issues

# Codex 对话入口只把已确认 Contract 写入本地队列；此 Workflow 定时或手动把队列发布为 GitHub Issue。
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# 仓库内容只读，Issue 写权限仅供最终发布；Codex 不在这条 Workflow 中运行。
permissions:
  contents: read
  issues: write

# 队列目录由自托管 Runner 共享，单发布器可避免两个进程同时领取同一请求。
concurrency:
  group: conversation-issue-publisher
  cancel-in-progress: false

jobs:
  # 必须落到 signalpatch 自托管 Runner，才能看到 enqueue-conversation-issue.mjs 写入的本地队列。
  publish:
    runs-on: [self-hosted, macOS, ARM64, signalpatch]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # Controller 会重新校验 Contract、按 request UUID 防重，然后才使用短时 App Token 创建 Issue。
      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.SIGNALPATCH_APP_ID }}
          private-key: ${{ secrets.SIGNALPATCH_APP_PRIVATE_KEY }}
      - name: Publish queued conversation Issues
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/controllers/publish-conversation-issues.mjs
