name: Publish Conversation Issues

# 【做什么】读取 Mac 本地队列里 Codex 已确认的需求，创建 GitHub Issue（对话入口，非网站 Feedback）
# 【何时跑】每 5 分钟；须跑在自托管 Mac Runner（队列在本地磁盘）
# 【详见】.github/workflows/README.md
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# 仓库内容只读，Issue 写权限仅供最终发布；Codex 不在这条 Workflow 中运行。
permissions:
  contents: read
  issues: write

# 队列目录由自托管 Runner 共享，单发布器可避免两个进程同时领取同一请求。
concurrency:
  group: conversation-issue-publisher
  cancel-in-progress: false

jobs:
  # 必须落到 signalpatch 自托管 Runner，才能读到 ~/.signalpatch/conversation-issue-queue（或 SIGNALPATCH_CONVERSATION_QUEUE）。
  publish:
    runs-on: [self-hosted, macOS, ARM64, signalpatch]
    steps:
      # 检出 controller 脚本、Schema 与 policy；Codex enqueue 不在此 Workflow 内执行。
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
        with:
          version: 11.7.0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      # Ajv 校验、requiredRisk 上调、GitHub search 防重均依赖 node_modules。
      - run: pnpm install --frozen-lockfile
      # 短时 Installation Token；Codex enqueue 阶段不得持有 GH_TOKEN。
      - id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349 # v2
        with:
          app-id: ${{ vars.SIGNALPATCH_APP_ID }}
          private-key: ${{ secrets.SIGNALPATCH_APP_PRIVATE_KEY }}
      # pending→processing→POST Issue→completed；publisher.lock 与 Workflow concurrency 双重防并发。
      - name: Publish queued conversation Issues
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: node scripts/controllers/publish-conversation-issues.mjs
